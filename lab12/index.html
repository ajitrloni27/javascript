<!DOCTYPE html>
<html>

<head>

<title>Program 12</title>

<style>

body
{
    font-family: Arial;
    background: lightgray;
}

.box
{
    width: 300px;
    margin: auto;
    background: white;
    border: 1px solid black;
    padding: 20px;
}
.output
{
    width: 200px;
    margin: auto;
    background: white;
    border: 1px solid black;
    padding: 20px;
}
</style>

</head>

<body>

<div class="box">

<h2>Select Color and Fruit</h2>

Select Color:

<br><br>

<select id="colorSelect">

<option>Red</option>

<option>Blue</option>

<option>Green</option>

</select>

<br><br>

Select Fruit:

<br><br>

<select id="fruitList" size="4">

<option>Apple</option>

<option>Banana</option>

<option>Mango</option>

<option>Orange</option>

</select>

<div id="output" class="output">

Your selection will appear here.

</div>

</div>

<script src="script.js"></script>

</body>

</html>
